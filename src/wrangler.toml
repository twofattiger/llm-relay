name = "llm-relay"
main = "worker.js"
compatibility_date = "2026-06-10"

# 非敏感变量(明文)
[vars]
ACCOUNT_ID = "你的_CLOUDFLARE_账号ID"
# 在cloudflate 创建AI gateway取的给的名字
GATEWAY = "cf-ai-gateway"
# 管理面板查 Worker 用量时用,需与上面的 name 一致
WORKER_NAME = "llm-relay"

# ---- 公用存储 RelayStore:Durable Object(SQLite)----
# 一个 DO 承载:动态对外 API key、登录防爆破、预留用量计数。单实例 idFromName("relay")。
# 不绑定也能跑:此时只有 MY_API_KEY 有效、面板 Key 管理不可用、登录防爆破跳过。
[[durable_objects.bindings]]
name = "RELAY_DO"
class_name = "RelayStore"

[[migrations]]
tag = "v2"
# 因为旧版本有LoginGuard，需要移除掉
deleted_classes = ["LoginGuard"]
new_sqlite_classes = ["RelayStore"]


# 敏感变量(secret),用 npx wrangler secret put 注入,勿明文写在此文件
# -------------------------------------------------------------------------
# 1. 对外发放的 API key(客户端用 Authorization: Bearer 或 x-api-key 携带)
# npx wrangler secret put MY_API_KEY
#
# 2. Cloudflare API Token —— 一个 token 同时用于 cf-aig-authorization(BYOK)
#    和 Authorization Bearer(REST)。手动创建,权限给全:
#      AI Gateway — Run         (BYOK 路由必需,漏了无前缀路由会认证失败)
#      Workers AI — Read        (@cf/ 路由)
#      Account Analytics — Read (管理面板查 GraphQL 统计;不开面板可不要)
#      AI Gateway — Read/Edit   (可选,仅当还想管理网关配置)
# npx wrangler secret put CF_API_TOKEN
#
# 3. 管理面板登录密码(配了它才启用 /admin 面板)
# npx wrangler secret put ADMIN_PASSWORD
#
# 4. Anthropic API Key(可选,仅当 Anthropic BYOK 需 Worker 补 x-api-key 时)
# npx wrangler secret put ANTHROPIC_API_KEY
# -------------------------------------------------------------------------