name = "llm-relay"
main = "worker.js"
compatibility_date = "2026-06-10"

# 非敏感变量(明文)
[vars]
ACCOUNT_ID = "你的_CLOUDFLARE_账号ID"
GATEWAY = "cf-ai-gateway"

# 敏感变量(MY_API_KEY / CF_API_TOKEN / 可选 ANTHROPIC_API_KEY)
# -------------------------------------------------------------------------
# 为了安全起见，请勿在此文件明文填写这些敏感变量！
# 请在本地终端中运行以下命令，然后按提示逐个输入对应的值进行注入：
#
# 1. 客户端请求时的验证密钥 (自定义，对外发放)
# npx wrangler secret put MY_API_KEY
#
# 2. Cloudflare API Token —— 一个 token 同时用于 cf-aig-authorization(BYOK)
#    和 Authorization Bearer(REST)。务必手动创建并给全权限：
#      AI Gateway — Run        (BYOK 路由必需，漏了它无前缀路由会认证失败)
#      Workers AI — Read       (@cf/ 路由)
#      AI Gateway — Read/Edit  (可选，仅当还想管理网关配置)
# npx wrangler secret put CF_API_TOKEN
#
# 3. Anthropic API Key (可选，仅当 Anthropic BYOK 需 Worker 补 x-api-key 时)
# npx wrangler secret put ANTHROPIC_API_KEY
# -------------------------------------------------------------------------